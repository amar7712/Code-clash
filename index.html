<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamified Quiz App</title>
<link href=ss2?family=Popp"https://fonts.googleapis.com/cins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #1d2b64, #f8cdda);
  display: flex; justify-content: center; align-items: center;
  height: 100vh; margin: 0;
}
.quiz-container {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding: 25px; border-radius: 15px; width: 420px;
  text-align: center; color: white;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  animation: fadeIn 0.8s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(20px);} to {opacity:1; transform:translateY(0);} }
.option { display:block; margin:10px 0; padding:12px; border-radius:8px; cursor:pointer; transition:0.3s; background:rgba(255,255,255,0.15);} 
.option:hover { transform:scale(1.05); background:rgba(255,255,255,0.25);} 
.correct { background:#00c853 !important; animation:pulse 0.5s; }
.wrong { background:#ff5252 !important; animation:shake 0.4s; }
@keyframes shake {0%{transform:translateX(0);}25%{transform:translateX(-5px);}50%{transform:translateX(5px);}75%{transform:translateX(-5px);}100%{transform:translateX(0);} }
@keyframes pulse {0%{transform:scale(1);}50%{transform:scale(1.1);}100%{transform:scale(1);} }
.progress-bar { height:8px; background:rgba(255,255,255,0.2); border-radius:10px; margin-bottom:15px; overflow:hidden; }
.progress { height:100%; width:0%; background:linear-gradient(90deg,#00f260,#0575e6); transition:width 0.5s ease; }
.timer { font-size:18px; margin:10px 0; animation:blink 1s infinite; }
@keyframes blink {50%{opacity:0.5;} }
button { padding:10px 20px; border:none; border-radius:8px; background:#ff7eb3; color:white; cursor:pointer; transition:0.3s; }
button:hover { background:#ff4f91; transform:scale(1.05);} 
.badge { display:inline-block; margin:5px; padding:6px 10px; border-radius:20px; background:gold; color:black; font-size:12px; animation:fadeIn 0.5s; }
.stats { display:flex; justify-content:space-between; font-size:14px; margin-bottom:10px; }
</style>
</head>
<body>
<div class="quiz-container">
  <div class="stats">
    <div>⭐ Points: <span id="points">0</span></div>
    <div>🏆 Level: <span id="level">1</span></div>
  </div>
  <div class="progress-bar"><div class="progress" id="progress"></div></div>
  <h2 id="question"></h2>
  <div id="options"></div>
  <div class="timer">⏱️ <span id="time">15</span>s</div>
  <button onclick="nextQuestion()">Next</button>
  <div id="badges"></div>
</div>
<script>
const quiz = [
  {q:"Capital of India?", o:["Delhi","Mumbai","Chennai","Kolkata"], a:0},
  {q:"5 + 3 = ?", o:["5","8","10","6"], a:1},
  {q:"HTML stands for?", o:["Hyper Trainer","Hyper Text Markup Language","High Text","None"], a:1},
  {q:"JS is used for?", o:["Styling","Structure","Logic","Database"], a:2},
  {q:"CSS stands for?", o:["Cascading Style Sheets","Color Style","Computer Style","None"], a:0}
];
let index=0, score=0, timer, timeLeft=9;
let points=0, level=1;
let badges=[];

function loadQuestion(){
  clearInterval(timer);
  timeLeft=9;
  document.getElementById("time").innerText=timeLeft;
  let q=quiz[index];
  document.getElementById("question").innerText=q.q;
  let optionsHTML="";
  q.o.forEach((opt,i)=>{
    optionsHTML+=`<div class='option' onclick='selectAnswer(${i}, this)'>${opt}</div>`;
  });
  document.getElementById("options").innerHTML=optionsHTML;
  timer=setInterval(()=>{
    timeLeft--;
    document.getElementById("time").innerText=timeLeft;
    if(timeLeft===0) nextQuestion();
  },1000);
  updateProgress();
}

function selectAnswer(i,el){
  let correct=quiz[index].a;
  let options=document.querySelectorAll(".option");
  options.forEach(opt=>opt.onclick=null);
  if(i===correct){
    el.classList.add("correct");
    score++; points+=10;
    checkLevel();
  } else {
    el.classList.add("wrong");
    options[correct].classList.add("correct");
  }
  updateStats();
}

function checkLevel(){
  let newLevel = Math.floor(points/20)+1;
  if(newLevel>level){
    level=newLevel;
    addBadge("Level " + level + " Reached 🎉");
  }
}

function addBadge(text){
  badges.push(text);
  let badgeEl=document.createElement("div");
  badgeEl.className="badge";
  badgeEl.innerText=text;
  document.getElementById("badges").appendChild(badgeEl);
}

function updateStats(){
  document.getElementById("points").innerText=points;
  document.getElementById("level").innerText=level;
}

function nextQuestion(){
  index++;
  if(index<quiz.length){ loadQuestion(); }
  else {
    addBadge("Quiz Completed 🏁");
    document.querySelector(".quiz-container").innerHTML = `
      <h2>🎉 Score: ${score}/${quiz.length}</h2>
      <h3>⭐ Points: ${points}</h3>
      <h3>🏆 Level: ${level}</h3>
      <div>${badges.map(b=>`<div class='badge'>${b}</div>`).join("")}</div>
    `;
  }
}

function updateProgress(){
  let percent=(index/quiz.length)*100;
  document.getElementById("progress").style.width=percent+"%";
}

loadQuestion();
</script>
</body>
</html>
