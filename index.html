<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamified Quiz App</title>

<!-- ✅ Fixed Font Link -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #1d2b64, #f8cdda);
  display: flex; justify-content: center; align-items: center;
  height: 100vh; margin: 0;
}
.quiz-container {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding: 25px; border-radius: 15px; width: 420px;
  text-align: center; color: white;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
.option { margin:10px 0; padding:12px; border-radius:8px; cursor:pointer; background:rgba(255,255,255,0.15);}
.correct { background:#00c853 !important; }
.wrong { background:#ff5252 !important; }
.progress-bar { height:8px; background:rgba(255,255,255,0.2); border-radius:10px; margin-bottom:15px; overflow:hidden; }
.progress { height:100%; width:0%; background:linear-gradient(90deg,#00f260,#0575e6); }
.timer { margin:10px 0; }
button { padding:10px 20px; border:none; border-radius:8px; background:#ff7eb3; color:white; cursor:pointer;}
.badge { margin:5px; padding:6px 10px; border-radius:20px; background:gold; color:black; font-size:12px; }
.stats { display:flex; justify-content:space-between; margin-bottom:10px; }
input { padding:10px; border-radius:8px; border:none; width:80%; }
</style>
</head>

<body>

<!-- 🔐 LOGIN SCREEN -->
<div id="login-screen" class="quiz-container">
  <h2>🎮 Welcome to Quiz</h2>
  <input type="text" id="playerName" placeholder="Enter your name"><br><br>
  <button onclick="startQuiz()">Start Quiz</button>
</div>

<!-- 🎯 QUIZ SCREEN -->
<div id="quiz-screen" class="quiz-container" style="display:none;">
  <div class="stats">
    <div>⭐ Points: <span id="points">0</span></div>
    <div>🏆 Level: <span id="level">1</span></div>
  </div>
  <div class="progress-bar"><div class="progress" id="progress"></div></div>
  <h2 id="question"></h2>
  <div id="options"></div>
  <div class="timer">⏱️ <span id="time">15</span>s</div>
  <button onclick="nextQuestion()">Next</button>
  <div id="badges"></div>
</div>

<script>
let playerName = "";

function startQuiz(){
  playerName = document.getElementById("playerName").value;

  if(playerName.trim() === ""){
    alert("Enter your name!");
    return;
  }

  document.getElementById("login-screen").style.display="none";
  document.getElementById("quiz-screen").style.display="block";

  loadQuestion();
}

const quiz = [
  {q:"Capital of India?", o:["Delhi","Mumbai","Chennai","Kolkata"], a:0},
  {q:"5 + 3 = ?", o:["5","8","10","6"], a:1},
  {q:"HTML stands for?", o:["Hyper Trainer","Hyper Text Markup Language","High Text","None"], a:1},
  {q:"JS is used for?", o:["Styling","Structure","Logic","Database"], a:2},
  {q:"CSS stands for?", o:["Cascading Style Sheets","Color Style","Computer Style","None"], a:0}
];

let index=0, score=0, timer, timeLeft=15;
let points=0, level=1;
let badges=[];

function loadQuestion(){
  clearInterval(timer);
  timeLeft=15;
  document.getElementById("time").innerText=timeLeft;

  let q=quiz[index];
  document.getElementById("question").innerText=q.q;

  let optionsHTML="";
  q.o.forEach((opt,i)=>{
    optionsHTML+=`<div class='option' onclick='selectAnswer(${i}, this)'>${opt}</div>`;
  });

  document.getElementById("options").innerHTML=optionsHTML;

  timer=setInterval(()=>{
    timeLeft--;
    document.getElementById("time").innerText=timeLeft;
    if(timeLeft===0) nextQuestion();
  },1000);

  updateProgress();
}

function selectAnswer(i,el){
  let correct=quiz[index].a;
  let options=document.querySelectorAll(".option");
  options.forEach(opt=>opt.onclick=null);

  if(i===correct){
    el.classList.add("correct");
    score++; points+=10;
    checkLevel();
  } else {
    el.classList.add("wrong");
    options[correct].classList.add("correct");
  }

  updateStats();
}

function checkLevel(){
  let newLevel = Math.floor(points/20)+1;
  if(newLevel>level){
    level=newLevel;
    addBadge("Level " + level + " Reached 🎉");
  }
}

function addBadge(text){
  badges.push(text);
  let badgeEl=document.createElement("div");
  badgeEl.className="badge";
  badgeEl.innerText=text;
  document.getElementById("badges").appendChild(badgeEl);
}

function updateStats(){
  document.getElementById("points").innerText=points;
  document.getElementById("level").innerText=level;
}

function nextQuestion(){
  index++;
  if(index<quiz.length){
    loadQuestion();
  } else {
    document.getElementById("quiz-screen").innerHTML = `
      <h2>🎉 ${playerName}, Your Score: ${score}/${quiz.length}</h2>
      <h3>⭐ Points: ${points}</h3>
      <h3>🏆 Level: ${level}</h3>
      ${badges.map(b=>`<div class='badge'>${b}</div>`).join("")}
    `;
  }
}

function updateProgress(){
  let percent=(index/quiz.length)*100;
  document.getElementById("progress").style.width=percent+"%";
}
</script>

</body>
</html>
